name: Build XPI

on:
  push:
    branches: [main]
    paths:
      - 'popup.js'
      - 'popup.html'
      - 'background.js'
      - 'manifest.json'
      - 'gmail.js'
      - 'vercel.json'
      - 'update.xml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract base files from files.zip
        run: unzip -o files.zip -d extracted/

      - name: Build XPI
        run: |
          # Start with everything from the old zip (icons, manifest, gmail, vercel)
          cp extracted/*.png . 2>/dev/null || true
          cp extracted/manifest.json . 2>/dev/null || true
          cp extracted/gmail.js . 2>/dev/null || true
          cp extracted/vercel.json . 2>/dev/null || true
          # popup.html, popup.js, background.js already in repo (overrides extracted)
          ls -la *.png manifest.json gmail.js vercel.json popup.html popup.js background.js
          zip -j petvalu-bot.xpi \
            manifest.json \
            popup.html \
            popup.js \
            background.js \
            gmail.js \
            vercel.json \
            icon16.png \
            icon32.png \
            icon48.png \
            icon128.png \
            icon.png

      - name: Commit and push XPI
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add petvalu-bot.xpi
          if git diff --cached --quiet; then
            echo "XPI unchanged"
          else
            git commit -m "chore: rebuild petvalu-bot.xpi [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
